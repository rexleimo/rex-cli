site_name: rex-ai-boot Documentation
site_url: https://cli.rexai.top
site_description: Local-first multi-CLI agent workflow docs for Codex CLI, Claude Code, and Gemini CLI.
site_author: RexAI
repo_url: https://github.com/rexleimo/rex-ai-boot
repo_name: rexleimo/rex-ai-boot

docs_dir: docs-site
site_dir: site

theme:
  name: material
  custom_dir: docs-site/overrides
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang:
        - en
        - zh
        - ja
        - ko
  - i18n:
      docs_structure: folder
      reconfigure_material: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 简体中文
          build: true
        - locale: ja
          name: 日本語
          build: true
        - locale: ko
          name: 한국어
          build: true

extra:
  links:
    product: https://cli.rexai.top
    blog: https://rexai.top
    tools: https://tool.rexai.top

extra_javascript:
  - assets/analytics-placeholder.js

extra_css:
  - assets/custom.css

nav:
  - Overview: index.md
  - Quick Start: getting-started.md
  - CLI Workflows: use-cases.md
  - Architecture: architecture.md
  - ContextDB: contextdb.md
  - Troubleshooting: troubleshooting.md
